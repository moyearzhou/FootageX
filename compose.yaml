name: footagex

services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.4}
    container_name: footagex_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-footagex-root-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-footagex}
      MYSQL_USER: ${MYSQL_USER:-footagex}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-footagex-password}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-footagex-root-password}"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  footagex:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
    image: footagex:local
    container_name: footagex
    environment:
      HOST: 0.0.0.0
      PORT: 5173
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-footagex}
      DB_USER: ${MYSQL_USER:-footagex}
      DB_PASSWORD: ${MYSQL_PASSWORD:-footagex-password}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5173:5173"
    volumes:
      - ./outputs:/app/outputs
    restart: unless-stopped

volumes:
  mysql-data:
